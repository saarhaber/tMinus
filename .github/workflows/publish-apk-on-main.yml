name: Publish main APK to GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-apk-main
  cancel-in-progress: true

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Point rolling tag at this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest-main "${{ github.sha }}"
          git push origin "refs/tags/latest-main" --force

      - name: Upload APK to rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: Latest main (debug)
          body: |
            Automated **debug** build from `main` at `${{ github.sha }}`.

            This prerelease is updated on every merge to `main`. For versioned installs, use a tagged release (`v*`) from the same Releases page.
          prerelease: true
          make_latest: "false"
          target_commitish: ${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
