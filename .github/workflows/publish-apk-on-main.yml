name: Publish main APK to GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Queue runs so a fast follow-up merge cannot cancel a job after the tag moved
# but before the APK finished uploading (which leaves an empty release).
concurrency:
  group: publish-apk-main
  cancel-in-progress: false

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Single step: create/move tag, release, and upload assets (avoids empty releases
      # if a concurrent run was cancelled between `git push tag` and upload).
      - name: Publish rolling prerelease with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: Latest main (debug)
          body: |
            Automated **debug** build from `main` at `${{ github.sha }}`.

            This prerelease is updated on every merge to `main`. For versioned installs, use a tagged release (`v*`) from the same Releases page.
          prerelease: true
          make_latest: "false"
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: app/build/outputs/apk/debug/app-debug.apk
