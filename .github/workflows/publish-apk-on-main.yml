name: Publish APK to repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-apk-main
  cancel-in-progress: true

jobs:
  publish-apk:
    # Pushing the APK commits with [skip ci] — do not rebuild in a loop
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.head_commit &&
           !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Commit and push APK to releases/
        run: |
          mkdir -p releases
          cp app/build/outputs/apk/debug/app-debug.apk releases/tminus-latest.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/tminus-latest.apk
          if git diff --staged --quiet; then
            echo "APK unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore: update latest debug APK [skip ci]"
          git push
